<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Slayer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            touch-action: manipulation;
            overflow: hidden;
            background-color: #000;
        }
        .game-area {
            height: calc(100vh - 80px);
            position: relative;
        }
        #target {
            position: absolute;
            font-size: 4rem;
            cursor: pointer;
            transition: transform 0.05s ease;
            user-select: none;
            display: none;
            z-index: 10;
            padding: 10px;
        }
        #target:active {
            transform: scale(0.7);
        }
        .scare-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .scare-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(0.5) contrast(2.5) brightness(0.7);
        }
        @keyframes violent-shake {
            0% { transform: translate(15px, 15px) rotate(0deg); }
            10% { transform: translate(-15px, -20px) rotate(-5deg); }
            20% { transform: translate(-25px, 0px) rotate(5deg); }
            30% { transform: translate(25px, 20px) rotate(0deg); }
            40% { transform: translate(15px, -15px) rotate(5deg); }
            50% { transform: translate(-15px, 20px) rotate(-5deg); }
            60% { transform: translate(-25px, 15px) rotate(0deg); }
            70% { transform: translate(25px, 15px) rotate(-5deg); }
            80% { transform: translate(-15px, -15px) rotate(5deg); }
            90% { transform: translate(15px, 20px) rotate(0deg); }
            100% { transform: translate(15px, -20px) rotate(-5deg); }
        }
        .shake-intense {
            animation: violent-shake 0.05s infinite;
        }
        #flash {
            position: fixed;
            inset: 0;
            background: #ff0000;
            opacity: 0;
            pointer-events: none;
            z-index: 101;
        }
    </style>
</head>
<body class="text-white font-sans">

    <div id="flash"></div>

    <!-- HUD -->
    <div class="h-20 bg-zinc-900 flex items-center justify-between px-6 border-b border-zinc-800">
        <div>
            <h1 class="text-xl font-bold text-red-600 tracking-tighter uppercase">Slayer</h1>
            <p class="text-[10px] text-zinc-500 uppercase tracking-widest">Goal: 10 Kills</p>
        </div>
        <div class="text-right">
            <div id="score-display" class="text-4xl font-black text-white italic">0</div>
        </div>
    </div>

    <!-- Play Area -->
    <main class="game-area bg-neutral-950" id="game-container">
        <div id="target">🖕</div>
        
        <!-- Start Screen -->
        <div id="start-screen" class="absolute inset-0 flex flex-col items-center justify-center bg-black z-20 p-8 text-center">
            <div class="text-7xl mb-6 opacity-60">🖕</div>
            <h2 class="text-3xl font-black mb-4 tracking-tighter">Can you Win?</h2>
            <p class="mb-10 text-zinc-500 text-sm max-w-xs uppercase tracking-widest leading-tight">Tap 🖕 to win<br> Or you Fail</p>
            <button id="start-btn" class="border-4 border-red-700 text-red-700 font-black py-4 px-14 rounded-sm text-2xl transition-all active:scale-90 hover:bg-red-700 hover:text-black">
                BEGIN
            </button>
        </div>
    </main>

    <!-- Jump Scare Overlay -->
    <div id="scare-overlay" class="scare-overlay">
        <!-- Restored previous visual -->
        <img src="https://images.unsplash.com/photo-1509248961158-e54f6934749c?q=80&w=2000&auto=format&fit=crop" class="scare-image shake-intense" id="scare-img">
    </div>

    <!-- Win Screen -->
    <div id="win-screen" class="hidden fixed inset-0 bg-black z-50 flex flex-col items-center justify-center p-8 text-center">
        <h2 class="text-7xl font-black text-white mb-2">FINISHED</h2>
        <p class="text-red-600 mb-10 uppercase font-bold tracking-[0.3em]">You are still here.</p>
        <button onclick="location.reload()" class="bg-zinc-800 text-white font-bold py-4 px-10 rounded-sm">RESTART</button>
    </div>

    <audio id="hit-sound">
        <source src="https://upload.wikimedia.org/wikipedia/commons/3/34/Sound_Effect_-_Banging_on_a_Metal_Pipe.ogg" type="audio/ogg">
    </audio>

    <script>
        const target = document.getElementById('target');
        const scoreDisplay = document.getElementById('score-display');
        const gameContainer = document.getElementById('game-container');
        const startScreen = document.getElementById('start-screen');
        const startBtn = document.getElementById('start-btn');
        const scareOverlay = document.getElementById('scare-overlay');
        const winScreen = document.getElementById('win-screen');
        const flash = document.getElementById('flash');
        const hitSound = document.getElementById('hit-sound');

        let audioCtx;
        let score = 0;
        let gameActive = false;
        let currentSpeed = 1600;
        let speedIncrement = 130;
        let moveTimer = null;

        function playScream() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            const duration = 2.5;
            const mainGain = audioCtx.createGain();
            mainGain.connect(audioCtx.destination);

            mainGain.gain.setValueAtTime(0, audioCtx.currentTime);
            mainGain.gain.linearRampToValueAtTime(1.5, audioCtx.currentTime + 0.05); 
            mainGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);

            const createVoice = (freq, type, detune) => {
                const osc = audioCtx.createOscillator();
                const vGain = audioCtx.createGain();
                
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(freq * 3, audioCtx.currentTime + 0.2);
                osc.frequency.exponentialRampToValueAtTime(freq / 2, audioCtx.currentTime + duration);
                
                osc.detune.setValueAtTime(detune, audioCtx.currentTime);
                
                const modulator = audioCtx.createOscillator();
                const mGain = audioCtx.createGain();
                modulator.frequency.value = 30; 
                mGain.gain.value = 50;
                modulator.connect(mGain);
                mGain.connect(osc.frequency);
                modulator.start();

                osc.connect(vGain);
                vGain.connect(mainGain);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
                modulator.stop(audioCtx.currentTime + duration);
            };

            createVoice(150, 'sawtooth', 0);
            createVoice(400, 'square', 10);
            createVoice(800, 'sawtooth', -10);
            createVoice(2000, 'sine', 5);
        }

        function triggerScare() {
            gameActive = false;
            target.style.display = 'none';
            scareOverlay.style.display = 'flex';
            
            let flashCount = 0;
            const flashIntv = setInterval(() => {
                flash.style.opacity = flash.style.opacity === '1' ? '0' : '1';
                flashCount++;
                if (flashCount > 10) {
                    clearInterval(flashIntv);
                    flash.style.opacity = '0';
                }
            }, 50);

            playScream();

            if (navigator.vibrate) {
                navigator.vibrate([100, 50, 200, 50, 400, 50, 1000]);
            }

            setTimeout(() => {
                scareOverlay.style.display = 'none';
                winScreen.classList.remove('hidden');
                score = 10;
                scoreDisplay.textContent = score;
            }, 3000);
        }

        function moveTarget() {
            if (!gameActive) return;
            const x = Math.random() * (gameContainer.clientWidth - 100);
            const y = Math.random() * (gameContainer.clientHeight - 100);
            target.style.left = `${x}px`;
            target.style.top = `${y}px`;
            target.style.display = 'block';

            clearTimeout(moveTimer);
            moveTimer = setTimeout(moveTarget, currentSpeed);
        }

        function handleHit(e) {
            if (e) e.preventDefault();
            if (!gameActive) return;

            score++;
            scoreDisplay.textContent = score;
            
            hitSound.currentTime = 0;
            hitSound.play().catch(() => {});

            if (score === 9) {
                triggerScare();
                return;
            }

            currentSpeed = Math.max(500, currentSpeed - speedIncrement);
            moveTarget();
        }

        target.addEventListener('touchstart', handleHit, { passive: false });
        target.addEventListener('mousedown', handleHit);

        startBtn.addEventListener('click', () => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            startScreen.style.display = 'none';
            gameActive = true;
            moveTarget();
        });
    </script>
</body>
</html>
